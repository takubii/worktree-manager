name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (goimports + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check goimports
        shell: bash
        run: |
          files="$(git ls-files '*.go')"
          if [ -z "$files" ]; then
            echo "No Go files found."
            exit 0
          fi

          unformatted="$($(go env GOPATH)/bin/goimports -l $files)"
          if [ -n "$unformatted" ]; then
            echo "The following files need goimports:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

  cross-platform:
    name: Build and test (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/wto

  required:
    name: CI Required
    needs:
      - quality
      - cross-platform
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "quality job did not succeed: ${{ needs.quality.result }}"
            exit 1
          fi
          if [ "${{ needs.cross-platform.result }}" != "success" ]; then
            echo "cross-platform job did not succeed: ${{ needs.cross-platform.result }}"
            exit 1
          fi
          echo "All required jobs passed."
